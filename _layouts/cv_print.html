<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --accent-emerald: #0f766e;
      --accent-gold: #b45309;
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --font-body: 'Inter', -apple-system, sans-serif;
      --font-headings: 'Outfit', sans-serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: var(--font-body);
      color: var(--text-primary);
      line-height: 1.5;
      background-color: #ffffff;
      padding: 3rem 2.5rem;
      max-width: 820px;
      margin: 0 auto;
      font-size: 9.5pt;
    }
    
    /* Document Title (Name) */
    h1 {
      font-family: var(--font-headings);
      font-size: 24pt;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 0.15rem;
    }
    
    /* Subtitle (Professional Title) */
    h1 + p {
      font-family: var(--font-headings);
      font-size: 11pt;
      font-weight: 600;
      color: var(--accent-gold);
      margin-bottom: 0.6rem;
      margin-top: -0.1rem;
    }
    
    /* Contact Details Block */
    h1 + p + p {
      font-size: 8.5pt;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 0.8rem;
      border-bottom: 1.5px solid var(--accent-emerald);
      padding-bottom: 0.75rem;
    }
    
    h1 + p + p a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }
    
    h1 + p + p a:hover {
      color: var(--accent-emerald);
    }
    
    /* General Spacing Rules */
    hr {
      display: none; /* Hide standard markdown horizontal lines since we add cleaner section borders */
    }
    
    /* Section Headings */
    h2 {
      font-family: var(--font-headings);
      font-size: 12.5pt;
      font-weight: 700;
      color: var(--accent-emerald);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 1.75rem;
      margin-bottom: 0.75rem;
      border-bottom: 1.5px solid var(--border-color);
      padding-bottom: 0.25rem;
      page-break-after: avoid;
    }
    
    /* Role Headings */
    h3 {
      font-family: var(--font-headings);
      font-size: 11pt;
      font-weight: 700;
      color: var(--text-primary);
      margin-top: 1.25rem;
      margin-bottom: 0.25rem;
      page-break-after: avoid;
    }
    
    /* Company & Date Sub-header */
    h3 + p {
      font-size: 9pt;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      border-bottom: 1px dashed rgba(0, 0, 0, 0.06);
      padding-bottom: 0.25rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    
    h3 + p strong {
      color: var(--text-primary);
    }
    
    /* Descriptions & Bullet Points */
    p, ul, table {
      margin-bottom: 0.6rem;
      color: var(--text-secondary);
    }
    
    ul {
      padding-left: 1.2rem;
      list-style-type: square;
    }
    
    li {
      margin-bottom: 0.3rem;
    }
    
    a {
      color: var(--accent-emerald);
      text-decoration: none;
    }
    
    /* Table (Education / Development) Styles */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
    }
    
    th, td {
      padding: 0.45rem 0.6rem;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
      font-size: 9pt;
    }
    
    th {
      font-weight: 700;
      color: var(--text-primary);
      background-color: rgba(15, 118, 110, 0.03);
    }
    
    /* Custom Styling for Lists under Summary */
    h2 + ul {
      list-style-type: none;
      padding-left: 0;
    }
    
    h2 + ul > li {
      margin-bottom: 0.45rem;
      font-size: 9.5pt;
    }
    
    h2 + ul > li strong {
      color: var(--text-primary);
    }
    
    /* Print Utility Button */
    .print-button-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 100;
    }
    
    .print-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: var(--accent-emerald);
      color: #ffffff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      font-family: var(--font-headings);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(15, 118, 110, 0.4);
      transition: all 0.2s ease;
    }
    
    .print-btn:hover {
      background-color: #0d5e57;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(15, 118, 110, 0.5);
    }
    
    /* Responsive adjustment for preview */
    @media (max-width: 768px) {
      body {
        padding: 1.5rem;
      }
      h3 + p {
        flex-direction: column;
        gap: 0.25rem;
      }
    }
    
    /* Print media overrides */
    @media print {
      body {
        padding: 0;
        margin: 0;
        max-width: 100%;
        font-size: 9pt;
      }
      
      h2 {
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
      }
      
      h3 {
        margin-top: 1rem;
      }
      
      .print-button-container {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  
  <div class="print-button-container">
    <button class="print-btn" onclick="window.print()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
      Print / Save as PDF
    </button>
  </div>

  {{ content }}

</body>
</html>
