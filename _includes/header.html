<header id="site-header">
  <div class="header-container">
    <!-- Brand Identity -->
    <a href="{{ '/' | relative_url }}" class="brand-logo">
      <span class="first-name">eva-christin</span>
      <span class="last-name">ernst</span>
    </a>

    <!-- Desktop Navigation Links -->
    <nav class="desktop-nav">
      <a href="{{ '/' | relative_url }}" class="nav-item">Home</a>
      <a href="{{ '/about/' | relative_url }}" class="nav-item">About</a>
      <a href="{{ '/projects/' | relative_url }}" class="nav-item">Projects</a>
      <a href="{{ '/contact/' | relative_url }}" class="nav-item">Contact</a>
      
      <!-- Theme Switcher Button -->
      <button id="theme-toggle-btn" aria-label="Toggle light/dark theme" title="Toggle theme">
        <!-- Moon Icon (Dark Mode Trigger) -->
        <svg class="theme-icon moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <!-- Sun Icon (Light Mode Trigger) -->
        <svg class="theme-icon sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
    </nav>

    <!-- Mobile Navigation Toggle Button -->
    <div class="mobile-controls">
      <button id="mobile-theme-toggle-btn" class="icon-btn" aria-label="Toggle theme">
        <svg class="theme-icon moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="theme-icon sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
      <button id="hamburger-menu-btn" class="icon-btn" aria-label="Open navigation menu">
        <span class="hamburger-bar bar-1"></span>
        <span class="hamburger-bar bar-2"></span>
        <span class="hamburger-bar bar-3"></span>
      </button>
    </div>
  </div>

  <!-- Mobile Dropdown Navigation Menu -->
  <div id="mobile-dropdown-menu">
    <nav class="mobile-nav-list">
      <a href="{{ '/' | relative_url }}" class="mobile-nav-item">Home</a>
      <a href="{{ '/about/' | relative_url }}" class="mobile-nav-item">About</a>
      <a href="{{ '/projects/' | relative_url }}" class="mobile-nav-item">Projects</a>
      <a href="{{ '/contact/' | relative_url }}" class="mobile-nav-item">Contact</a>
    </nav>
  </div>
</header>
